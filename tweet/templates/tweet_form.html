{% extends "layout.html" %}

{% block title %}
chai aur tweet

{% block content %}

<h1 class="text-center text-white mt-4">Welcome to Chai's Django Project</h1>


<h2>{% if form.instance.pk %}
    Edit Tweet
     {%else %} 
     Create Tweet
     {%endif%} 
     <form method="post" enctype="multipart/form-data" class="form">
       {% csrf_token %}
     {{form.as_p}}
     <button class="btn-warning" type="submit">submit</button>
     </form>
     <a href ="{% url 'tweet_list' %}">Back to Tweets</a>
</h2>

{% endblock %}{% endblock %}
