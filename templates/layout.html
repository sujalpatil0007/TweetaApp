{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>
        {% block title %}
        Chai aur Code
        {% endblock %}
    </title>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">

    <a class="navbar-brand" href="#">TweetBar</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="{% url 'tweet_list' %}">Home</a>
        </li>
      </ul>

      <!-- ✅ FIXED SEARCH -->
      <form method="GET" action="{% url 'tweet_list' %}" class="d-flex me-2">
        <input 
          class="form-control me-2" 
          type="search" 
          name="q" 
          placeholder="Search tweets..." 
          value="{{ request.GET.q }}"
        >
        <button class="btn btn-outline-success">Search</button>
      </form>

      <a href="{% url 'tweet_list' %}" class="btn btn-primary me-2">Tweet Home</a>

      {% if user.is_authenticated %}
        <span class="text-white me-2">Hi, {{ user.username }}</span>

        <form method="post" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Logout</button>
        </form>

      {% else %}
        <a href="{% url 'login' %}" class="btn btn-success me-2">Login</a>
        <a href="{% url 'register' %}" class="btn btn-warning">Register</a>
      {% endif %}

    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
